name: Install Security Scanners
description: Install Semgrep, Trivy, and Gitleaks

runs:
  using: composite
  steps:
    - name: Install Semgrep
      shell: bash
      run: pip3 install semgrep

    - name: Install Trivy
      shell: bash
      run: |
        curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

    - name: Install Gitleaks
      shell: bash
      run: |
        curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar xz -C /usr/local/bin gitleaks

    - name: Verify scanners
      shell: bash
      run: |
        semgrep --version
        trivy --version
        gitleaks version
